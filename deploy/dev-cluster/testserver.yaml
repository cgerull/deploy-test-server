# Dev local configuaration
#
image:
  tag: "1.0.0"

namespace: testserver

# -- Horizontal scaling settings.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 50
  # targetMemoryUtilizationPercentage: 70

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ports:
  - name: http
    containerPort: 8080
    protocol: TCP

env:
  - name: SECRET_KEY
    value: DevHelmChartSecret
  - name: ENV
    value: "dev-cluster"

# volumeMounts:
#   - mountPath: /run/secret/my-secret
#     name: testsecret

ingress:
  enabled: true
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
  hosts:
    - host: testserver.dieren.gerull.nl
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: testserver
              port:
                number: 80

persistence:
  enabled: false
  snapshots: false
  volumes:
    - name: testserver-data
      mountPath: /data
      claimName: testserver-data
      # storageClass: "local-path"
      size: 512M
      accessMode: ReadWriteMany

sealedSecrets:
  enabled: true
  secrets:
    - secretName: testserver
      secretAnnotations:
        sealedsecrets.bitnami.com/namespace-wide: "true"
      encryptedData:
        testserver: 

livenessProbe:
  httpGet:
    path: /health
    port: 80
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 5