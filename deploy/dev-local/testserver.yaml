# Dev local configuaration
# Should run on minikube with nginx ingress
#
image:
  tag: "0.9.70"

# -- Horizontal scaling settings.
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 50
  # targetMemoryUtilizationPercentage: 70

upgradeStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1

# Replicaset history to keep, default = 10
revisionHistoryLimit: 2

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  port: 80

env:
  - name: SECRET_KEY
    value: DevHelmChartSecret
  - name: ENV
    value: "dev-local"

# volumeMounts:
#   - mountPath: /run/secret/my-secret
#     name: testsecret

ingress:
  enabled: true
  annotations:
    # traefik.ingress.kubernetes.io/router.entrypoints: web
    # cert-manager.io/issuer: testserver
    kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$1
  hosts:
    - host: testserver.dev.gerull.nl
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: testserver
              port:
                number: 80
  tls:
    - hosts:
      - testserver.dev.gerull.nl
      secretName: testserver-tls

certificates:
  enabled: true
  email: cgerull@gmail.com
  acmeServer: https://acme-staging-v02.api.letsencrypt.org/directory
  dnsNames:
    - '*.dev.gerull.nl'
    - 'dev.gerull.nl'
  dns01:
    host: acme-staging-v02.api.letsencrypt.org
    accountSecretRef:
      key: acmedns.json
      name: acme-dns-account

persistence:
  enabled: false
  snapshots: false
  volumes:
    - name: testserver-data
      mountPath: /data
      claimName: testserver-data
      storageClass: "local-path"
      size: 512M
      accessMode: ReadWriteMany

localSecrets:
  enabled: true
  secrets:
    - name: testsecret
      secretName: testserver
      mountPath: /run/secret/my-secret
