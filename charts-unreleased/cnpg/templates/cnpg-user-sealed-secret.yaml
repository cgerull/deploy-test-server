{{ if eq .Values.global.cluster "test7" }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  annotations:
    sealedsecrets.bitnami.com/cluster-wide: "true"
  name: {{ .Release.Name }}-cnpg-user-secret
spec:
  encryptedData:
    password: 
    username: 
  template:
    metadata:
      annotations:
        sealedsecrets.bitnami.com/cluster-wide: "true"
      name: {{ .Release.Name }}-cnpg-user-secret
    type: kubernetes.io/basic-auth
{{ end }}
