apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: cgerull@gmail.com
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
    - selector:
        dnsZones:
          - "dev.gerull.nl"
      dns01:
        acmeDNS:
          accountSecretRef:
            key: acmedns.json
            name: acme-dns-account
          host: acme-staging-v02.api.letsencrypt.org
