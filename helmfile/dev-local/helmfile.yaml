  - name: gitlab
    url: https://{{ requiredEnv "GITHUB_TOKEN" }}@raw.gitlab.com/api/v4/projects/34978775/packages/helm/stable
    # url: https://gitlab.com/api/v4/projects/34978775/packages/helm/stable

releases:
  - name: testserver
    chart: testserver
    version: 1.0.0
    values:
      - testserver.yaml

  - name: mysql
    chart: ../../charts-unreleased/mysql
    values:
      - mysql.yaml